<header class="flex items-center justify-between px-8 py-6">
    <div>
        <h1 class="text-xl font-semibold text-gray-800">{{ page_title|default:"Dashboard" }}</h1>
        {% if page_subtitle %}
         <p class="text-sm text-purple-500 font-medium">{{ page_subtitle }}</p>
        {% endif %}
    </div>

    <div class="flex-1 max-w-md mx-8">
        <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
            <input type="text" placeholder="Search leads, companies..." class="w-full pl-10 pr-4 py-2.5 rounded-full border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>
    </div>

    <div class="text-lg font-bold text-purple-600">
        Agentic<span class="text-gray-800">Flow</span>
    </div>
</header>
